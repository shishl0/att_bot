name: Deploy Bot
on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Pull and Restart
        run: |
          cd /home/zhan/att_bot
          git pull origin main
          ./venv/bin/pip install -r requirements.txt
          sudo systemctl restart att_bot